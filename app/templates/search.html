{% extends "base.html" %}

{% block title %}Поиск{% endblock %}

{% block content %}
<h1 class="page-title">Поиск пересдач</h1>

<section class="grid-two">
    <div class="card">
        <h2>Поиск по учебной группе</h2>
        <form action="/files/search-by-group" method="get">
            <input type="text" name="group" placeholder="Введите группу, например БЭК-22-ФК-2">
            <button type="submit">Найти</button>
        </form>
    </div>

    <div class="card">
        <h2>Поиск по выписке о задолженностях</h2>
        <form action="/files/search-by-statement" enctype="multipart/form-data" method="post">
            <input type="file" name="file" accept=".txt,.docx,.pdf">
            <button type="submit">Загрузить выписку и найти</button>
        </form>
        <p class="hint">Поддерживаются файлы .txt, .docx и .pdf</p>
    </div>
</section>
{% endblock %}
